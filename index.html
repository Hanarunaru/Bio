    <title>SYSTEM_INIT - ACCESS GRANTED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --lime: #ccff00;
            --dark-blue: #020617;
            --mid-blue: #0f172a;
            --accent-glow: rgba(204, 255, 0, 0.4);
        }

        body,
        html {
            margin: 0;
            padding: 0;
            background-color: var(--dark-blue);
            color: var(--lime);
            font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
            /* 关键修改：允许纵向滚动，防止手机端内容截断 */
            overflow-y: auto;
            overflow-x: hidden;
            min-height: 100%;
            width: 100%;
            cursor: crosshair;
        }
